<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Recomendador Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white w-full max-w-2xl p-6 rounded-2xl shadow-xl">

        <h1 class="text-2xl font-bold mb-4">Recomendação Inteligente</h1>

        <!-- USO -->
        <div class="mb-4">
            <p class="font-semibold mb-2">Como o cliente usa?</p>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <label><input type="checkbox" value="home_office"> Home Office</label>
                <label><input type="checkbox" value="gamer_competitivo"> Gamer competitivo</label>
                <label><input type="checkbox" value="streaming_alto"> Streaming HD/4K</label>
                <label><input type="checkbox" value="redes_intenso"> Redes sociais intensas</label>
                <label><input type="checkbox" value="downloads_pesados"> Downloads pesados</label>
                <label><input type="checkbox" value="estudos_online"> Estudos online</label>
                <label><input type="checkbox" value="casa_conectada"> Muitos dispositivos</label>
            </div>
        </div>

        <!-- PESSOAS -->
        <div class="mb-4">
            <p class="font-semibold mb-2">Quantidade de pessoas</p>
            <select id="pessoas" class="w-full border p-2 rounded">
                <option value="1">1–2</option>
                <option value="3">3–4</option>
                <option value="5">5+</option>
            </select>
        </div>

        <!-- PERFIL -->
        <div class="mb-4">
            <p class="font-semibold mb-2">Perfil</p>
            <select id="perfil" class="w-full border p-2 rounded">
                <option value="">Padrão</option>
                <option value="economico">Econômico</option>
                <option value="custo_beneficio">Custo-benefício</option>
                <option value="exigente">Exigente</option>
                <option value="familia">Família</option>
            </select>
        </div>

        <!-- DOR -->
        <div class="mb-4">
            <p class="font-semibold mb-2">Problema atual</p>
            <select id="dor" class="w-full border p-2 rounded">
                <option value="">Nenhum</option>
                <option value="lento">Lentidão</option>
                <option value="trava_streaming">Vídeos travando</option>
                <option value="trava_jogo">Lag em jogos</option>
                <option value="wifi_fraco">Wi-Fi fraco</option>
                <option value="queda_constante">Quedas</option>
                <option value="horario_pico">Piora à noite</option>
                <option value="muitos_usuarios">Problema com várias pessoas</option>
            </select>
        </div>

        <button onclick="gerar()" class="w-full bg-blue-600 text-white py-3 rounded-xl">
            Gerar recomendação
        </button>

        <!-- RESULTADO -->
        <div id="resultadoBox" class="hidden mt-6">

            <div class="grid grid-cols-3 gap-3 text-center mb-4">

                <!-- DOWN -->
                <div id="downBox" onclick="trocarPlano('down')"
                    class="bg-gray-100 p-3 rounded opacity-70 cursor-pointer hover:scale-105 transition">
                    <p class="text-xs">Mais econômico</p>
                    <p id="down"></p>
                </div>

                <!-- PRINCIPAL -->
                <div class="bg-blue-600 text-white p-4 rounded-xl scale-105">
                    <p class="text-xs">Recomendado</p>
                    <p id="principal" class="font-bold"></p>
                </div>

                <!-- UP -->
                <div id="upBox" onclick="trocarPlano('up')"
                    class="bg-gray-100 p-3 rounded opacity-70 cursor-pointer hover:scale-105 transition">
                    <p class="text-xs">Mais desempenho</p>
                    <p id="up"></p>
                </div>

            </div>

            <div class="bg-gray-50 p-4 rounded border">
                <pre id="texto" class="whitespace-pre-wrap text-sm"></pre>
            </div>

            <button onclick="copiar()" class="mt-4 w-full bg-green-600 text-white py-2 rounded">
                Copiar
            </button>

        </div>

    </div>

    <script src="textos.js"></script>
    <script src="app.js"></script>

</body>

</html>
