<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Recomendador Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff7a1a',
                        primaryHover: '#e86500',
                        primarySoft: '#fff4ec'
                    }
                }
            }
        }
    </script>
    <script>
        let debounceTimer;
        function autoAtualizar() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                gerar();
            }, 150); // evita múltiplos triggers rápidos
        }
    </script>
</head>

<body class="bg-slate-300 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-2xl p-4 rounded-2xl shadow-xl">

        <!-- HEADER -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Recomendação Inteligente</h1>
            <p class="text-sm text-gray-500">Monte a recomendação ideal em segundos</p>
        </div>

        <!-- USO -->
        <div class="mb-3">
            <p class="font-semibold mb-2 text-gray-700">Como o cliente usa?</p>

            <div class="grid grid-cols-2 gap-1 text-sm">

                <label class="flex items-center gap-1 p-1 rounded-lg hover:bg-primarySoft cursor-pointer">
                    <input type="checkbox" value="home_office"> Home Office
                </label>

                <label class="flex items-center gap-1 p-1 rounded-lg hover:bg-primarySoft cursor-pointer">
                    <input type="checkbox" value="gamer_competitivo"> Gamer
                </label>

                <label class="flex items-center gap-1 p-1 rounded-lg hover:bg-primarySoft cursor-pointer">
                    <input type="checkbox" value="streaming_alto"> Streamings
                </label>

                <label class="flex items-center gap-1 p-1 rounded-lg hover:bg-primarySoft cursor-pointer">
                    <input type="checkbox" value="redes_intenso"> Redes sociais intensas
                </label>

                <label class="flex items-center gap-1 p-1 rounded-lg hover:bg-primarySoft cursor-pointer">
                    <input type="checkbox" value="estudos_online"> Estudos online
                </label>

                <label class="flex items-center gap-1 p-1 rounded-lg hover:bg-primarySoft cursor-pointer">
                    <input type="checkbox" value="casa_conectada"> Muitos dispositivos
                </label>

            </div>
        </div>

        <!-- PESSOAS -->
        <div class="mb-3">
            <p class="font-semibold mb-2 text-gray-700">Quantidade de pessoas</p>
            <select id="pessoas"
                class="w-full bg-slate-200 border rounded-xl p-2 focus:ring-2 focus:ring-primary outline-none">
                <option value="1">1–2 pessoas</option>
                <option value="3">3–4 pessoas</option>
                <option value="5">5+ pessoas</option>
            </select>
        </div>

        <!-- PERFIL -->
        <div class="mb-3">
            <p class="font-semibold mb-2 text-gray-700">Perfil</p>
            <select id="perfil"
                class="w-full bg-slate-200 border rounded-xl p-2 focus:ring-2 focus:ring-primary outline-none">
                <option value="">Padrão</option>
                <option value="economico">Econômico</option>
                <option value="custo_beneficio">Custo-benefício</option>
                <option value="exigente">Exigente</option>
                <option value="familia">Família</option>
            </select>
        </div>

        <!-- RESULTADO -->
        <div id="resultadoBox" class="hidden mt-6">

            <!-- PLANOS -->
            <div class="grid grid-cols-3 gap-3 text-center mb-3">

                <!-- DOWN -->
                <div id="downBox" onclick="trocarPlano('down')"
                    class="bg-primarySoft p-3 rounded-xl cursor-pointer hover:scale-105 transition">

                    <p class="text-xs text-gray-500">Mais econômico</p>
                    <p id="down" class="font-medium text-gray-700"></p>
                </div>

                <!-- PRINCIPAL -->
                <div class="bg-primary text-white p-4 rounded-xl shadow-lg scale-105">

                    <p class="text-xs bg-white/20 inline-block px-2 py-1 rounded-md mb-1">
                        Recomendado
                    </p>

                    <p id="principal" class="font-bold text-lg"></p>
                </div>

                <!-- UP -->
                <div id="upBox" onclick="trocarPlano('up')"
                    class="bg-primarySoft p-3 rounded-xl cursor-pointer hover:scale-105 transition">

                    <p class="text-xs text-gray-500">Mais desempenho</p>
                    <p id="up" class="font-medium text-gray-700"></p>
                </div>

            </div>

            <!-- TEXTO -->
            <div class="bg-gray-50 p-4 rounded-xl border text-sm">
                <pre id="texto" class="whitespace-pre-wrap"></pre>
            </div>

            <!-- COPIAR -->
            <button onclick="copiar()" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-1 rounded-lg">
                Copiar texto
            </button>

        </div>

    </div>

    <script src="textos.js"></script>
    <script src="app.js"></script>

</body>

</html>
